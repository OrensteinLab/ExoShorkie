name: shorki
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core
  - python=3.9
  - pip

  # Bio / genomics tools
  - biopython
  - blat
  - ushuffle
  - meme

  # Scientific stack (commonly required)
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - matplotlib

  # Pip-installed packages
  - pip:
      # Deep learning
      - tensorflow==2.15.1
      - keras==2.15.0
      - tensorboard==2.15.2

      # Project-specific
      - git+https://github.com/calico/baskerville-yeast.git@main
      - modisco-lite==2.4.0
      - pybedtools==0.9.1
      - qnorm==0.8.1

      # Utilities
      - tqdm==4.65.2
      - tabulate==0.8.10
